name: Pytest Check

on:
  push:
    paths:
      - 'src'
  pull_request:
    paths:
      - 'src'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Installs dependencies
        run: |
          uv sync --group dev

      - name: Run Pytest
        run: |
          uv run pytest --cov=src --cov-report=html --cov-fail-under=90
